<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Visualisation d'arbres</title>
    <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>
    <header>
        <h1>Visualisation d'arbres et de forets</h1>
    </header>

    <main>
        <section class="toolbar">
            <label class="file-button" for="json-file-input">Charger JSON</label>
            <input type="file" id="json-file-input" accept=".json,application/json">
            <button id="export-tree-button">Exporter SVG</button>
            <button id="export-tree-png">Exporter PNG</button>
            <span id="file-status">Aucun fichier chargé</span>
        </section>

        <section id = "node-options-panel">
            <h2>Affichage des noeuds</h2>

            <label>
                <input type="radio" name="display-scope" id="scope-tree" value="tree" checked>
                tout l'arbre
            </label>
            <label>
                <input type="radio" name="display-scope" id="scope-node" value="node">
                noeud sélectionné
            </label>

            <label>
                <input type="checkbox" id="node-show-condition">
                condition
            </label>
            <label>
                <input type="checkbox" id="node-show-gini">
                gini
            </label>
            <label>
                <input type="checkbox" id="node-show-samples">
                samples
            </label>
            <label>
                <input type="checkbox" id="node-show-value">
                value
            </label>
            <label>
                <input type="checkbox" id="node-show-class">
                class
            </label>
        </section>

        <svg id="tree-view" width="3000" height="900"></svg>
        <div id="tooltip"></div>
    </main>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="js/tree-viz.js?v=3"></script>
    <script src="js/export-utils.js?v=3"></script>
    <script src="js/app.js?v=3"></script>
</body>
</html>
