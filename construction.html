<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Construction d'un arbre</title>
    <link rel="stylesheet" href="css/style.css?v=82">
</head>

<body>
    <header>
        <div class="app-header-title">
            <h1>Construction pas à pas</h1>
            <span>Voir comment les régions de décision apparaissent</span>
        </div>
        <nav class="top-nav" aria-label="Navigation principale">
            <a href="index.html">Visualisation</a>
            <a class="is-active" href="construction.html">Construction</a>
            <a href="entrainement-foret.html">Entraînement forêt</a>
        </nav>
    </header>

    <main>
        <aside class="sidebar">
            <section class="toolbar">
                <h2>Données</h2>
                <label class="file-button" for="construction-json-file-input">Charger JSON</label>
                <input type="file" id="construction-json-file-input" accept=".json,application/json">
                <span id="construction-file-status">Aucun fichier chargé</span>
            </section>

            <section class="toolbar">
                <h2>Étapes</h2>
                <button id="prev-build-step" disabled>Étape précédente</button>
                <button id="next-build-step" disabled>Étape suivante</button>
                <button id="reset-build-step" disabled>Recommencer</button>
                <span id="build-step-status">Aucun arbre chargé</span>
            </section>

        </aside>

        <section class="visualization-area">
            <section class="construction-placeholder">
                <h2>Mode construction</h2>
                <p>La visualisation pas à pas sera ajoutée ici.</p>
            </section>

            <div class="construction-workspace">
                <section class="construction-panel">
                    <h2>Arbre</h2>
                    <svg id="construction-tree-view" width="1200" height="700"></svg>
                </section>

                <section class="construction-panel construction-region-panel">
                    <h2>Régions de décision</h2>
                    <svg id="construction-region-view" viewBox="0 0 504 520" width="504" height="520"></svg>
                    <div id="region-legend" class="region-legend" aria-label="Légende des classes"></div>
                </section>
            </div>
        </section>
    </main>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="js/shared/tree-viz.js?v=53"></script>
    <script src="js/shared/layout-utils.js?v=60"></script>
    <script src="js/construction/steps.js?v=15"></script>
    <script src="js/construction/tree-renderer.js?v=19"></script>
    <script src="js/construction/decision-regions.js?v=22"></script>
    <script src="js/construction/app.js?v=22"></script>

</body>

</html>
